<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quest Log</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jim+Nightshade&family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <script defer src="script.js"></script>
</head>
<body>
    <div class="container">
        <div class="app-wrapper">

            <!-- Title & progress sit ABOVE the scroll -->
            <div class="above-scroll">
                <h1>Quest Log</h1>
                <div class="stat-container">
                    <div class="details">
                        <h3>Checkpoint</h3>
                        <div id="progressbar">
                            <div id="progress"></div>
                        </div>
                    </div>
                    <div class="stats-number">
                        <p id="numbers">0 / 0</p>
                    </div>
                </div>
                <form class="input-area">
                    <input type="text" id="task-input" placeholder="New Quest...">
                    <button type="submit" id="add-task-button"><i class="fa-solid fa-plus"></i></button>
                </form>
            </div>

            <!-- Scroll only contains the task list -->
            <div class="todo-app">
                <div class="todos-container">
                    <ul id="task-list"></ul>
                    <img src="./images/quill.png" alt="Quill" class="quill-image">
                </div>
            </div>

        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</body>
</html>
